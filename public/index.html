<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NotebookLM RAG</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
</head>

<body>
    <main class="layout">

        <!-- Left panel -->
        <div class="left-panel">

            <!-- Upload section -->
            <section class="card" id="upload-card">
                <h2>Upload document</h2>

                <form id="upload-form">
                    <div class="file-picker" id="file-drop-zone">
                        <input type="file" id="file-input" accept=".pdf,.txt,.csv" />

                        <!-- Drop zone (default state) -->
                        <label class="drop-zone-content" id="drop-zone-content" for="file-input">
                            <div class="drop-zone-icon">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
                                    <polyline points="17 8 12 3 7 8" />
                                    <line x1="12" y1="3" x2="12" y2="15" />
                                </svg>
                            </div>
                            <div class="drop-zone-text">
                                <span>Drop file or <span class="browse-link">browse</span></span>
                                <small>PDF, TXT, or CSV &middot; max 5 MB</small>
                            </div>
                        </label>

                        <!-- File selected state (hidden by default) -->
                        <div class="file-selected" id="file-selected">
                            <span class="file-type-badge" id="file-type-badge">?</span>
                            <div class="file-info">
                                <span class="file-name" id="file-name">No file selected</span>
                                <span class="file-size" id="file-size"></span>
                            </div>
                            <button type="button" class="file-clear-btn" id="file-clear" title="Remove file">
                                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2.5" stroke-linecap="round">
                                    <line x1="18" y1="6" x2="6" y2="18" />
                                    <line x1="6" y1="6" x2="18" y2="18" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <button type="submit" class="primary">Index document</button>
                </form>

                <div class="doc-meta">
                    <span class="doc-meta-label">Doc ID</span>
                    <code id="doc-id">&mdash;</code>
                </div>
            </section>

            <!-- Activity log section -->
            <section class="card" id="activity-card">
                <h2>What is happening</h2>
                <div id="activity-log">
                    <div class="log-entry log-idle">Waiting for a document&hellip;</div>
                </div>
            </section>

        </div>

        <!-- Right panel - chat -->
        <section class="chat-panel" id="chat-card">
            <div class="chat-header">
                <h2>Ask questions</h2>
                <p class="chat-sub" id="chat-subheading">Upload a document to get started</p>
            </div>

            <div class="chat" id="chat-log">
                <div class="chat-empty">
                    <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" />
                    </svg>
                    <p>Your conversation will appear here.</p>
                    <span class="empty-hint">Upload a document, then ask a question.</span>
                </div>
            </div>

            <div class="chat-footer">
                <form id="ask-form" class="ask">
                    <input type="text" id="question-input"
                        placeholder="Ask something about the document&hellip;" autocomplete="off" />
                    <button type="submit" class="send-btn" title="Send">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13" />
                            <polygon points="22 2 15 22 11 13 2 9 22 2" />
                        </svg>
                    </button>
                </form>
            </div>
        </section>

    </main>

    <script src="/app.js"></script>
</body>

</html>
